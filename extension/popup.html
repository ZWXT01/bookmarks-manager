<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bookmarks Manager</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      width: 360px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f8fafc;
      color: #1e293b;
    }
    
    .header {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
      padding: 16px;
      text-align: center;
    }
    
    .header h1 {
      font-size: 16px;
      font-weight: 600;
    }
    
    .content {
      padding: 16px;
    }
    
    .form-group {
      margin-bottom: 12px;
    }
    
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #64748b;
      margin-bottom: 4px;
    }
    
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 14px;
      background: white;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    
    .form-group input:focus,
    .form-group select:focus {
      outline: none;
      border-color: #3b82f6;
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
    }
    
    .form-group input:disabled,
    .form-group select:disabled {
      background: #f1f5f9;
      cursor: not-allowed;
    }

    .input-with-btn {
      display: flex;
      gap: 8px;
    }

    .input-with-btn input {
      flex: 1;
    }

    .input-with-btn button {
      padding: 0 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      background: white;
      color: #64748b;
      cursor: pointer;
      font-size: 12px;
      white-space: nowrap;
    }

    .input-with-btn button:hover {
      background: #f8fafc;
    }
    
    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
    }
    
    .btn-primary:disabled {
      background: #94a3b8;
      transform: none;
      box-shadow: none;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: white;
      color: #64748b;
      border: 1px solid #e2e8f0;
      margin-top: 8px;
    }
    
    .btn-secondary:hover {
      background: #f8fafc;
    }
    
    .status {
      margin-top: 12px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #bbf7d0;
    }
    
    .status.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fecaca;
    }
    
    .status.loading {
      display: block;
      background: #e0f2fe;
      color: #0369a1;
      border: 1px solid #bae6fd;
    }

    .status.warning {
      display: block;
      background: #fef3c7;
      color: #92400e;
      border: 1px solid #fde68a;
    }
    
    .settings-section {
      border-top: 1px solid #e2e8f0;
      padding-top: 12px;
      margin-top: 12px;
    }
    
    .settings-toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      padding: 8px 0;
    }
    
    .settings-toggle span {
      font-size: 13px;
      color: #64748b;
    }
    
    .settings-toggle svg {
      width: 16px;
      height: 16px;
      color: #94a3b8;
      transition: transform 0.2s;
    }
    
    .settings-toggle.open svg {
      transform: rotate(180deg);
    }
    
    .settings-content {
      display: none;
      padding-top: 8px;
    }
    
    .settings-content.show {
      display: block;
    }
    
    .connection-status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: #64748b;
      margin-top: 8px;
    }
    
    .connection-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #94a3b8;
    }
    
    .connection-dot.connected {
      background: #22c55e;
    }
    
    .connection-dot.disconnected {
      background: #ef4444;
    }

    .connection-dot.warning {
      background: #f59e0b;
    }
    
    .quick-actions {
      display: flex;
      gap: 8px;
      margin-top: 12px;
    }
    
    .quick-actions .btn {
      flex: 1;
      padding: 8px;
      font-size: 12px;
    }

    .help-text {
      font-size: 11px;
      color: #94a3b8;
      margin-top: 4px;
    }

    .help-text a {
      color: #3b82f6;
      text-decoration: none;
    }

    .help-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📚 Bookmarks Manager</h1>
  </div>
  
  <div class="content">
    <div id="main-form">
      <div class="form-group">
        <label>标题</label>
        <input type="text" id="title" placeholder="书签标题">
      </div>
      
      <div class="form-group">
        <label>网址</label>
        <input type="text" id="url" placeholder="https://example.com" readonly>
      </div>
      
      <div class="form-group">
        <label>分类</label>
        <select id="category">
          <option value="">未分类</option>
        </select>
      </div>
      
      <button class="btn btn-primary" id="save-btn">
        保存书签
      </button>
      
      <div class="quick-actions">
        <button class="btn btn-secondary" id="open-manager-btn">
          打开管理器
        </button>
        <button class="btn btn-secondary" id="check-btn">
          检查连接
        </button>
      </div>
      
      <div class="status" id="status"></div>
      
      <div class="connection-status">
        <div class="connection-dot" id="connection-dot"></div>
        <span id="connection-text">未连接</span>
      </div>
    </div>
    
    <div class="settings-section">
      <div class="settings-toggle" id="settings-toggle">
        <span>⚙️ 设置</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M6 9l6 6 6-6"/>
        </svg>
      </div>
      
      <div class="settings-content" id="settings-content">
        <div class="form-group">
          <label>服务器地址</label>
          <input type="text" id="server-url" placeholder="http://localhost:8080">
        </div>
        
        <div class="form-group">
          <label>API Token <span style="color: #ef4444;">*</span></label>
          <div class="input-with-btn">
            <input type="password" id="api-token" placeholder="必填，粘贴你的 API Token">
            <button type="button" id="toggle-token-btn">显示</button>
          </div>
          <div class="help-text">
            在服务器 <a href="#" id="open-settings-link">设置页面</a> 生成 Token
          </div>
        </div>
        
        <button class="btn btn-secondary" id="save-settings-btn">
          保存设置
        </button>
      </div>
    </div>
  </div>
  
  <script src="popup.js"></script>
</body>
</html>
