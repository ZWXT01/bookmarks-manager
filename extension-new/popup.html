<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmarks Manager</title>
    <link rel="stylesheet" href="popup.css">
</head>

<body>
    <div class="popup">
        <!-- Header -->
        <header class="header">
            <div class="logo">
                <span class="logo-icon">📚</span>
                <span class="logo-text">书签管理器</span>
            </div>
            <div class="status-badge" id="connection-status">
                <span class="dot" id="connection-dot"></span>
                <span id="connection-text">连接中</span>
            </div>
        </header>

        <!-- Alert -->
        <div id="status" class="alert hidden"></div>

        <!-- Form -->
        <div class="form">
            <input type="text" id="title" class="input" placeholder="📝 标题">
            <input type="text" id="url" class="input" placeholder="🔗 网址">
            <select id="category" class="input">
                <option value="">-- 选择分类 --</option>
            </select>
        </div>

        <!-- Main Actions - 重新设计按钮 -->
        <div class="actions">
            <button id="save-btn" class="btn primary">➕ 收藏</button>
            <button id="snapshot-btn" class="btn secondary">📸 存档</button>
            <button id="save-all-btn" class="btn success">⭐ 收藏+存档</button>
        </div>

        <!-- Quick Links -->
        <div class="quick-links">
            <button id="open-manager-btn" class="link">📋 管理页面</button>
            <button id="settings-toggle" class="link">⚙️ 设置</button>
        </div>

        <!-- Settings (collapsible) -->
        <div id="settings-content" class="settings hidden">
            <input type="text" id="server-url" class="input" placeholder="服务器地址">
            <div class="token-row">
                <input type="password" id="api-token" class="input" placeholder="API Token">
                <button id="toggle-token-btn" class="icon-btn">👁</button>
            </div>
            <div class="settings-actions">
                <button id="save-settings-btn" class="btn primary small">保存</button>
                <a id="open-settings-link" href="#" class="link">获取 Token</a>
            </div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>

</html>
